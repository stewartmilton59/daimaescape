{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Gallery | Daimaescape Villas</title>
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <!-- Lightbox2 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">
    <!-- Google Fonts (luxury serif) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free) for subtle icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b; /* deep black base */
            font-family: 'Poppins', sans-serif;
            color: #fff;
            line-height: 1.6;
        }

        /* luxury dark gradient background */
        .section-padding {
            padding: 100px 0;
            background: radial-gradient(circle at 10% 20%, #1a1a1a, #0a0a0a);
        }

        .container {
            max-width: 1320px;
            margin: 0 auto;
        }

        /* header with gold accent */
        .gallery-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .gallery-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5e7c8, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 0.5rem;
        }

        .gallery-header p {
            font-size: 1.25rem;
            font-weight: 300;
            color: #ccc;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: inline-block;
            padding-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        /* Filter buttons — elegant gold outline */
        .filter-btns {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 50px;
        }

        .filter-btns button {
            background: transparent;
            border: 2px solid #3a2e1f;
            color: #e0d6c0;
            font-weight: 500;
            font-size: 1rem;
            padding: 12px 32px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        .filter-btns button:hover,
        .filter-btns button.active {
            background: #d4af37;
            border-color: #d4af37;
            color: #0a0a0a;
            font-weight: 600;
            box-shadow: 0 0 20px #d4af37;
            transform: translateY(-3px);
        }

        /* Gallery grid items */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
            transition: all 0.5s ease;
            aspect-ratio: 4 / 3;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 30px 40px -5px #d4af37;
            border-color: #d4af37;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 1s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* elegant overlay with "view" */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay span {
            background: #d4af37;
            color: #0b0b0b;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px black;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .gallery-item:hover .overlay span {
            transform: translateY(0);
        }

        /* Bootstrap col spacing & filter hiding */
        .gallery-filter {
            transition: all 0.4s;
        }

        /* subtle custom for lightbox background */
        .lb-loader .lb-cancel {
            background: #d4af37;
        }

        .lb-nav a.lb-prev,
        .lb-nav a.lb-next {
            opacity: 0.8;
        }

        /* responsive */
        @media (max-width: 768px) {
            .gallery-header h2 {
                font-size: 2.8rem;
            }
            .filter-btns button {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<!-- scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    // Initialize AOS
    AOS.init({
        duration: 1000,
        once: true,
        mirror: false
    });

    // Filter function with improved smoothness
    function filterSelection(category) {
        let items = document.getElementsByClassName("gallery-filter");
        let buttons = document.querySelectorAll(".filter-btns button");

        // remove active class from all buttons
        buttons.forEach(btn => btn.classList.remove("active"));
        // add active class to clicked button (event.target)
        event.target.classList.add("active");

        // show/hide with a slight fade effect (we toggle display)
        for (let i = 0; i < items.length; i++) {
            if (category === "all" || items[i].classList.contains(category)) {
                items[i].style.display = "block";
                items[i].style.opacity = "1";
            } else {
                items[i].style.display = "none";
                items[i].style.opacity = "0";
            }
        }
    }

    // Lightbox options for gold tint
    lightbox.option({
        'resizeDuration': 400,
        'wrapAround': true,
        'albumLabel': 'Image %1 of %2',
        'fadeDuration': 300,
        'imageFadeDuration': 400,
        'maxWidth': 1200
    });
</script>

<!-- additional style for lightbox custom (optional) -->
<style>
    .lb-nav a.lb-prev, .lb-nav a.lb-next, .lb-data .lb-close {
        filter: drop-shadow(0 0 6px #d4af37);
    }
    .lb-data .lb-number {
        color: #d4af37 !important;
        font-weight: 500;
    }
    .lb-data .lb-caption {
        color: #f5e7c8 !important;
        font-size: 1.1rem;
    }
</style>
