{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gallery | Daimaescape</title>

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <!-- Lightbox -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">

    <style>
        body {
            background: #111;
            color: #fff;
        }

        .section-padding {
            padding: 100px 0;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .gallery-header h2 {
            font-size: 42px;
            font-weight: 700;
            color: #d4af37;
        }

        .gallery-header p {
            color: #bbb;
        }

        /* Filter Buttons */
        .filter-btns {
            text-align: center;
            margin-bottom: 50px;
        }

        .filter-btns button {
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            padding: 8px 20px;
            margin: 5px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .filter-btns button:hover,
        .filter-btns button.active {
            background: #d4af37;
            color: #000;
        }

        /* Gallery Card */
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
        }

        .gallery-item img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
        }

        .gallery-item:hover .overlay {
            opacity: 1;
        }

        .overlay span {
            background: #d4af37;
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<section class="section-padding">
    <div class="container">

        <!-- Header -->
        <div class="gallery-header" data-aos="fade-up">
            <h2>Luxury Gallery</h2>
            <p>Explore the elegance and timeless comfort of Daimaescape Villas</p>
        </div>

        <!-- Filter Buttons -->
        <div class="filter-btns" data-aos="fade-up">
            <button class="active" onclick="filterSelection('all')">All</button>
            <button onclick="filterSelection('villa')">Villas</button>
            <button onclick="filterSelection('interior')">Interior</button>
            <button onclick="filterSelection('pool')">Pool</button>
            <button onclick="filterSelection('garden')">Garden</button>
        </div>

        <!-- Gallery Grid -->
        <div class="row g-4">

            <!-- Villa -->
            <div class="col-md-4 gallery-filter villa" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-4.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-4.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

            <!-- Interior -->
            <div class="col-md-4 gallery-filter interior" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-2.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-2.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

            <!-- Pool -->
            <div class="col-md-4 gallery-filter pool" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-1.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-1.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

            <!-- Garden -->
            <div class="col-md-4 gallery-filter garden" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-2.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-2.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

            <!-- Villa -->
            <div class="col-md-4 gallery-filter villa" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-3.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-3.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

            <!-- Interior -->
            <div class="col-md-4 gallery-filter interior" data-aos="zoom-in">
                <div class="gallery-item">
                    <a href="{% static 'img/about-4.jpg' %}" data-lightbox="gallery">
                        <img src="{% static 'img/about-4.jpg' %}" alt="">
                        <div class="overlay"><span>View</span></div>
                    </a>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init();

    function filterSelection(category) {
        let items = document.getElementsByClassName("gallery-filter");
        let buttons = document.querySelectorAll(".filter-btns button");

        buttons.forEach(btn => btn.classList.remove("active"));
        event.target.classList.add("active");

        for (let i = 0; i < items.length; i++) {
            items[i].style.display = 
                (category === "all" || items[i].classList.contains(category))
                ? "block" : "none";
        }
    }
</script>

</body>
</html>
